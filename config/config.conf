# =============================================================================
# MariaDB Manager — Main Configuration
# =============================================================================
# Override locally with config/config.local.conf (not committed).
# Environment overrides: MDBM_LOG_LEVEL, MDBM_UI_PREFERRED, MDBM_THEME_NAME,
# MDBM_DRIVER_NAME, MDBM_DEBUG, MDBM_PLUGIN_AUTOLOAD, MDBM_NO_COLOR.
# =============================================================================

# Application
APP_NAME="MariaDB Manager"
APP_VERSION="0.3.0"
APP_PREFIX="/usr/local"

# Database driver (modules use dispatcher_driver_* only)
DRIVER_NAME="mariadb"
DRIVER_DIR="drivers"

# MariaDB connection defaults (no passwords stored here)
MARIADB_HOST="localhost"
MARIADB_PORT="3306"
MARIADB_SOCKET="/run/mysqld/mysqld.sock"
MARIADB_USER="root"
MARIADB_DEFAULTS_FILE=""

# Paths (relative to install root unless absolute)
LOG_DIR="logs"
TMP_DIR="tmp"
BACKUP_DIR="backups"
PLUGIN_DIR="plugins"
THEME_DIR="themes"
MODULE_DIR="modules"
ASSET_DIR="assets"

# Logging
LOG_FILE="logs/manager.log"
LOG_LEVEL="INFO"
LOG_MAX_BYTES="10485760"
LOG_KEEP_FILES="5"
LOG_TO_CONSOLE="auto"
# auto | always | never

# UI
UI_PREFERRED="auto"
# auto | dialog | whiptail | plain
UI_TIMEOUT="0"
UI_BACKTITLE="MariaDB Manager"

# Theme
THEME_NAME="default"

# Plugins
PLUGIN_AUTOLOAD="yes"
PLUGIN_DISABLE=""
# Comma-separated plugin names to skip

# Security
CONFIRM_DANGEROUS="yes"
MASK_PASSWORDS="yes"
REQUIRE_TTY="yes"

# Runtime
STRICT_MODE="yes"
DEBUG="no"
# Set NO_COLOR to any value to disable ANSI colors
NO_COLOR=""

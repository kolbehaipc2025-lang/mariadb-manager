# =============================================================================
# Theme: default
# =============================================================================
# All UI colors must come from theme files. Never hardcode ANSI in modules.
# Values are ANSI SGR codes or named tokens resolved by core/theme.sh.
# =============================================================================

THEME_LABEL="Default"
THEME_DESCRIPTION="Clean light terminal theme for MariaDB Manager"

# Core palette (ANSI color numbers 0-255 or basic 0-7)
COLOR_RESET="0"
COLOR_FG="7"
COLOR_BG="0"
COLOR_PRIMARY="4"
COLOR_SECONDARY="6"
COLOR_SUCCESS="2"
COLOR_WARN="3"
COLOR_ERROR="1"
COLOR_INFO="4"
COLOR_DEBUG="5"
COLOR_MUTED="8"
COLOR_HIGHLIGHT="14"
COLOR_BORDER="8"
COLOR_TITLE="14"
COLOR_MENU="7"
COLOR_PROMPT="6"

# Semantic aliases used by logger / UI
COLOR_LOG_INFO="${COLOR_INFO}"
COLOR_LOG_WARN="${COLOR_WARN}"
COLOR_LOG_ERROR="${COLOR_ERROR}"
COLOR_LOG_DEBUG="${COLOR_DEBUG}"
